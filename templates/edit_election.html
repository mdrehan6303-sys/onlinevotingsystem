<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Election | NovaVote</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .dashboard-page {
            background: linear-gradient(135deg, #e8eaf6, #f0f2f5);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .dashboard-wrapper {
            max-width: 800px;
            margin: 0 auto;
        }

        .dashboard-title {
            color: #1a237e;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 24px;
            text-align: center;
        }

        .section-card {
            background: white;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1a237e;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #1a237e;
            box-shadow: 0 0 0 4px rgba(26, 35, 126, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            text-align: center;
            text-decoration: none;
        }

        .btn-primary {
            background: #1a237e;
            color: white;
        }

        .btn-primary:hover {
            background: #0d144a;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 35, 126, 0.2);
        }

        .btn-secondary {
            background: #f0f2f5;
            color: #1a237e;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .alert {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
        }

        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .alert-error {
            background: #ffebee;
            color: #c62828;
        }
    </style>
</head>

<body class="dashboard-page">
    <div class="dashboard-wrapper">
        <h1 class="dashboard-title">✏️ Edit Election</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <div class="section-card">
            <form method="POST">
                <div class="form-group">
                    <label>Election Title</label>
                    <input type="text" name="title" value="{{ election[1] }}" required>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="4">{{ election[2] }}</textarea>
                </div>

                <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <label>Start Date & Time</label>
                        <input type="datetime-local" name="start_time" value="{{ election[3] }}" required>
                    </div>
                    <div>
                        <label>End Date & Time</label>
                        <input type="datetime-local" name="end_time" value="{{ election[4] }}" required>
                    </div>
                </div>

                <div class="btn-group">
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
